# Set default shell
set-option -g default-shell $SHELL

# Set true color
set-option -sa terminal-overrides ",xterm*:Tc"

# Set mouse mode on
set -g mouse on

# Set prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# Start window numbering at 1
set -g base-index 1
setw -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
# source-file ~/.config/tmux/chadmux.conf
# source-file ~/.config/tmux/dotbar.conf
source-file ~/.config/tmux/minimal.conf

# vim-tmux-navigator: seamless C-h/j/k/l between vim and tmux panes.
# The wrapper (lib/wrappers.nix) sets TMUX_PLUGIN_DIR to the symlinkJoin
# of nixpkgs tmuxPlugins, and Home Manager links the same plugin into
# ~/.tmux/plugins/. Try the wrapper path first, fall back to HM's link.
if-shell -b '[ -f "$TMUX_PLUGIN_DIR/vim-tmux-navigator/vim-tmux-navigator.tmux" ]' \
  'run-shell "$TMUX_PLUGIN_DIR/vim-tmux-navigator/vim-tmux-navigator.tmux"'
if-shell -b '[ -f "$HOME/.tmux/plugins/vim-tmux-navigator/vim-tmux-navigator.tmux" ]' \
  'run-shell "$HOME/.tmux/plugins/vim-tmux-navigator/vim-tmux-navigator.tmux"'

# Set vi-mode
set-window-option -g mode-keys vi

# Yazi
set -g allow-passthrough on

set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Open panes in current directory
bind - split-window -c '#{pane_current_path}'
bind / split-window -h -c '#{pane_current_path}'
